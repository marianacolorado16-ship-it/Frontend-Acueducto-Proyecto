<div class="card mt-3 shadow-sm">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <h6 class="mb-0 font-weight-bold text-dark">Conceptos de Facturación</h6>
    <span class="badge badge-info" *ngIf="facturaId">Factura #{{facturaId}}</span>
  </div>
  
  <div class="card-body p-0">
    <div *ngIf="cargando" class="text-center py-4">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Consultando detalles...</p>
    </div>

    <div *ngIf="error" class="alert alert-warning m-3">
      {{ error }}
    </div>

    <div class="table-responsive" *ngIf="!cargando && !error">
      <table class="table table-hover mb-0">
        <thead class="thead-light">
          <tr>
            <th>Descripción</th>
            <th class="text-center">Cantidad</th>
            <th class="text-right">Precio Unit.</th>
            <th class="text-right">Subtotal</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of detalles">
            <td>{{ item.descripcion }}</td>
            <td class="text-center">{{ item.cantidad }}</td>
            <td class="text-right">{{ item.precioUnitario | currency }}</td>
            <td class="text-right font-weight-bold">{{ item.subtotal | currency }}</td>
          </tr>
          <tr *ngIf="detalles.length === 0 && !cargando">
            <td colspan="4" class="text-center py-4 text-muted">Esta factura no tiene detalles registrados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
