<div class="movimientos-container">
  <h2>Gestión de Movimientos de Inventario</h2>

  <div class="form-card">
    <h3>Registrar Nuevo Movimiento</h3>
    <div class="form-grid">
      <div class="field">
        <label>ID Item Inventario:</label>
        <input type="number" [(ngModel)]="nuevoMovimiento.inventarioId">
      </div>
      <div class="field">
        <label>Tipo:</label>
        <select [(ngModel)]="nuevoMovimiento.tipoMovimiento">
          <option value="ENTRADA">Entrada (+)</option>
          <option value="SALIDA">Salida (-)</option>
        </select>
      </div>
      <div class="field">
        <label>Cantidad:</label>
        <input type="number" [(ngModel)]="nuevoMovimiento.cantidad">
      </div>
      <div class="field">
        <label>Motivo:</label>
        <input type="text" [(ngModel)]="nuevoMovimiento.motivo" placeholder="Ej: Compra, Instalación...">
      </div>
      <button (click)="guardarMovimiento()" class="btn-save">Registrar</button>
    </div>
  </div>

  <div class="table-card">
    <h3>Historial Reciente</h3>
    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Item</th>
          <th>Tipo</th>
          <th>Cantidad</th>
          <th>Motivo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let mov of movimientos">
          <td>{{ mov.fechaMovimiento | date:'short' }}</td>
          <td>{{ mov.inventario?.nombre }}</td>
          <td>
            <span [class]="'badge ' + mov.tipoMovimiento.toLowerCase()">
              {{ mov.tipoMovimiento }}
            </span>
          </td>
          <td [class.text-entrada]="mov.tipoMovimiento === 'ENTRADA'" 
              [class.text-salida]="mov.tipoMovimiento === 'SALIDA'">
            {{ mov.tipoMovimiento === 'ENTRADA' ? '+' : '-' }}{{ mov.cantidad }}
          </td>
          <td>{{ mov.motivo }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
