<div class="container mt-4">
    <h2>Gestión de Turnos</h2>

    <form [formGroup]="turnoForm" (ngSubmit)="guardarTurno()" class="card p-3 mb-4 shadow-sm">
        <div class="row">
            <div class="col-md-3">
                <label>Fecha</label>
                <input type="date" formControlName="fechaTurno" class="form-control">
            </div>
            <div class="col-md-2">
                <label>Hora Inicio</label>
                <input type="time" formControlName="horaInicio" class="form-control">
            </div>
            <div class="col-md-2">
                <label>Hora Fin</label>
                <input type="time" formControlName="horaFin" class="form-control">
            </div>
            <div class="col-md-3">
                <label>ID Operador</label>
                <input type="number" formControlName="operadorId" class="form-control" placeholder="ID del operador">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" [disabled]="turnoForm.invalid" class="btn btn-primary w-100">Crear</button>
            </div>
        </div>
    </form>

    <div class="table-responsive card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Fecha</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Operador</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let t of turnos">
                    <td>{{ t.fechaTurno | date:'dd/MM/yyyy' }}</td>
                    <td>{{ t.horaInicio }}</td>
                    <td>{{ t.horaFin }}</td>
                    <td>{{ t.operador.nombres }} {{ t.operador.apellidos }}</td>
                    <td>
                        <span class="badge" [ngClass]="{'bg-success': t.estado === 'PROGRAMADO', 'bg-secondary': t.estado !== 'PROGRAMADO'}">
                            {{ t.estado }}
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
